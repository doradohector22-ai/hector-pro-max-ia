name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip pocketpal-ai.zip
          if [ -d "pocketpal-ai" ]; then
            echo "PROJECT_DIR=pocketpal-ai" >> $GITHUB_ENV
          else
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Install dependencies
        run: |
          cd ${{ env.PROJECT_DIR }}
          npm install --legacy-peer-deps

      - name: Force Gradle 8.8 and Patch Settings Correctly
        run: |
          cd ${{ env.PROJECT_DIR }}/android
          
          # 1. Forzar la version 8.8 en el wrapper y limpiar firmas viejas
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            sed -i 's/gradle-9.0.0-bin.zip/gradle-8.8-bin.zip/g' gradle/wrapper/gradle-wrapper.properties
            sed -i 's/gradle-9.0-bin.zip/gradle-8.8-bin.zip/g' gradle/wrapper/gradle-wrapper.properties
            sed -i '/distributionSha256Sum/d' gradle/wrapper/gradle-wrapper.properties
          fi
          
          # 2. Modificar el settings.gradle original manteniendo sus repositorios intactos
          # Reemplazamos la linea de includeBuild conflictiva por la ruta absoluta real del servidor
          if [ -f "settings.gradle" ]; then
            REAL_PATH="${GITHUB_WORKSPACE}/${{ env.PROJECT_DIR }}/node_modules/@react-native/gradle-plugin"
            sed -i "s|includeBuild(.*@react-native/gradle-plugin.*)|includeBuild('${REAL_PATH}')|g" settings.gradle
            echo "¡Archivo settings.gradle original modificado con exito!"
          fi

      - name: Build Android App
        run: |
          cd ${{ env.PROJECT_DIR }}/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx3g"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hector-PocketPal-Propio
          path: ${{ env.PROJECT_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk

