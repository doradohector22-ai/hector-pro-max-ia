name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip pocketpal-ai.zip
          if [ -d "pocketpal-ai" ]; then
            echo "PROJECT_DIR=pocketpal-ai" >> $GITHUB_ENV
          else
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK 21 (Requerido para Gradle 9)
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      - name: Install dependencies
        run: |
          cd ${{ env.PROJECT_DIR }}
          npm install --legacy-peer-deps

      - name: Fix React Native Gradle Plugin Path
        run: |
          cd ${{ env.PROJECT_DIR }}/android
          node -e "
          const fs = require('fs');
          if (fs.existsSync('settings.gradle')) {
            let content = fs.readFileSync('settings.gradle', 'utf8');
            content = content.replace(/includeBuild\([\s\S]*?@react-native\/gradle-plugin[\s\S]*?getParentFile\(\)\)/g, 'includeBuild(\"../node_modules/@react-native/gradle-plugin\")');
            fs.writeFileSync('settings.gradle', content);
            console.log('¡Archivo settings.gradle emparchado con exito!');
          }
          "

      - name: Configure Gradle Environment
        run: |
          cd ${{ env.PROJECT_DIR }}/android
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

      - name: Build Android App
        run: |
          cd ${{ env.PROJECT_DIR }}/android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hector-Pro-Max-IA
          path: ${{ env.PROJECT_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk
