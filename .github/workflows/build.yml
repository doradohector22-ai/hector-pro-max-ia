name: Build Android APK (Official Setup)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip pocketpal-ai.zip
          if [ -d "pocketpal-ai" ]; then
            echo "PROJECT_DIR=pocketpal-ai" >> $GITHUB_ENV
          else
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Ponemos el motor real: Java 22 requerido por Gradle 9
      - name: Setup Java JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'oracle'

      # Instalamos las dependencias primero para que exista la carpeta node_modules
      - name: Install dependencies
        run: |
          cd ${{ env.PROJECT_DIR }}
          npm install --legacy-peer-deps

      # Compilacion directa usando las herramientas originales del creador, sin parches
      - name: Build Android App
        run: |
          cd ${{ env.PROJECT_DIR }}/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx3g"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hector-PocketPal-Propio
          path: ${{ env.PROJECT_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk
