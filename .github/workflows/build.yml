name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip pocketpal-ai.zip
          if [ -d "pocketpal-ai" ]; then
            echo "PROJECT_DIR=pocketpal-ai" >> $GITHUB_ENV
          else
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Install dependencies
        run: |
          cd ${{ env.PROJECT_DIR }}
          npm install --legacy-peer-deps

      - name: Fix React Native Gradle Plugin Path
        run: |
          cd ${{ env.PROJECT_DIR }}/android
          node -e "
          const fs = require('fs');
          if (fs.existsSync('settings.gradle')) {
            let content = fs.readFileSync('settings.gradle', 'utf8');
            content = content.replace(/includeBuild\([\s\S]*?@react-native\/gradle-plugin[\s\S]*?getParentFile\(\)\)/g, 'includeBuild(\"../node_modules/@react-native/gradle-plugin\")');
            fs.writeFileSync('settings.gradle', content);
            console.log('¡Settings.gradle emparchado!');
          }
          "

      - name: Force Downgrade to Gradle 8.8 and Fix Checksum
        run: |
          cd ${{ env.PROJECT_DIR }}/android
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            # Reemplazar la URL por la version 8.8
            sed -i 's/gradle-9.0.0-bin.zip/gradle-8.8-bin.zip/g' gradle/wrapper/gradle-wrapper.properties
            sed -i 's/gradle-9.0-bin.zip/gradle-8.8-bin.zip/g' gradle/wrapper/gradle-wrapper.properties
            # Borrar la linea de verificacion de firma vieja para evitar el bloqueo
            sed -i '/distributionSha256Sum/d' gradle/wrapper/gradle-wrapper.properties
            echo "¡Gradle 8.8 configurado y firma vieja eliminada con exito!"
          fi

      - name: Build Android App
        run: |
          cd ${{ env.PROJECT_DIR }}/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx3g"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hector-PocketPal-Fixed
          path: ${{ env.PROJECT_DIR }}/android/app/build/outputs/apk/debug/app-debug.apk
